<title>Opening file...</title>
<script>
  const params = new URLSearchParams(window.location.search);
  const p = params.get('p');
  if (p) {
    window.location.href = 'audit3a:' + decodeURIComponent(p);
    setTimeout(function() { window.close(); }, 500);
  }
</script>
</head>
